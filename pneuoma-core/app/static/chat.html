<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PNEUOMA Core</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #07080d;
    --surface: #0d0f16;
    --surface-2: #131620;
    --border: #1a1d2a;
    --border-glow: #2a2d4a;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --text-faint: #3f3f46;
    --accent: #818cf8;
    --accent-dim: #4f46e5;
    --accent-glow: rgba(129, 140, 248, 0.08);
    --user-bg: #1a1d2e;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  body { display: flex; height: 100dvh; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: transform 0.2s;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-mark {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent-dim), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; font-size: 12px; color: white; flex-shrink: 0;
  }

  .sidebar-header h1 { font-size: 14px; font-weight: 500; letter-spacing: 0.5px; }

  .new-chat-btn {
    margin: 12px; padding: 10px 14px;
    border: 1px dashed var(--border-glow); border-radius: 10px;
    background: transparent; color: var(--text-dim);
    font-family: inherit; font-size: 13px;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: all 0.15s;
  }

  .new-chat-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  .chat-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
  .chat-list::-webkit-scrollbar { width: 3px; }
  .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .chat-item {
    padding: 10px 12px; border-radius: 8px; font-size: 13px;
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    transition: all 0.1s; margin-bottom: 2px;
  }

  .chat-item:hover { background: var(--surface-2); color: var(--text); }
  .chat-item.active { background: var(--surface-2); color: var(--text); }

  .chat-item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .chat-item-delete {
    opacity: 0; background: none; border: none; color: var(--text-faint);
    cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px;
  }

  .chat-item:hover .chat-item-delete { opacity: 1; }
  .chat-item-delete:hover { color: #ef4444; }

  .sidebar-footer {
    padding: 12px 16px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-faint);
    display: flex; align-items: center; gap: 6px;
  }

  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #22c55e; box-shadow: 0 0 6px rgba(34, 197, 94, 0.4);
  }

  .status-dot.offline { background: #ef4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.4); }

  /* ── Main ── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  .topbar {
    flex-shrink: 0; padding: 12px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .topbar-title { font-size: 13px; color: var(--text-dim); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }

  .memories-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    background: var(--accent-glow); color: var(--accent);
    padding: 3px 8px; border-radius: 6px; border: 1px solid rgba(129, 140, 248, 0.12);
  }

  .menu-btn {
    display: none; background: none; border: none;
    color: var(--text-dim); font-size: 20px; cursor: pointer; padding: 4px;
  }

  /* ── Messages ── */
  .messages {
    flex: 1; overflow-y: auto; padding: 20px 24px;
    display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px; color: var(--text-faint);
  }

  .empty-state .big-mark {
    width: 56px; height: 56px; border-radius: 16px;
    background: linear-gradient(135deg, var(--accent-dim), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; font-size: 22px; color: white; margin-bottom: 4px;
  }

  .empty-state p { font-size: 14px; }
  .empty-state .sub { font-size: 12px; }

  .msg-wrap { display: flex; flex-direction: column; max-width: 85%; position: relative; }
  .msg-wrap.user { align-self: flex-end; }
  .msg-wrap.assistant { align-self: flex-start; }

  .msg {
    padding: 12px 16px; border-radius: 16px; font-size: 14.5px;
    line-height: 1.6; white-space: pre-wrap; word-wrap: break-word;
    animation: msgIn 0.2s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-wrap.user .msg {
    background: var(--user-bg); border: 1px solid var(--border); border-bottom-right-radius: 4px;
  }

  .msg-wrap.assistant .msg { background: transparent; padding-left: 0; padding-right: 0; }

  .msg.system-msg {
    align-self: center; text-align: center; font-size: 12px;
    color: var(--text-faint); padding: 8px 16px; max-width: 100%;
  }

  .msg-actions {
    display: flex; gap: 4px; margin-top: 4px; opacity: 0; transition: opacity 0.15s;
  }

  .msg-wrap:hover .msg-actions { opacity: 1; }
  .msg-wrap.user .msg-actions { justify-content: flex-end; }

  .msg-action-btn {
    background: none; border: none; color: var(--text-faint); cursor: pointer;
    font-size: 11px; padding: 2px 6px; border-radius: 4px; font-family: inherit;
    transition: all 0.1s;
  }

  .msg-action-btn:hover { color: var(--accent); background: var(--accent-glow); }

  .edit-area {
    width: 100%; resize: none; border: 1px solid var(--accent-dim); border-radius: 12px;
    background: var(--surface); color: var(--text); font-family: inherit;
    font-size: 14px; line-height: 1.5; padding: 10px 14px; outline: none;
    max-height: 140px; overflow-y: auto;
  }

  .edit-actions { display: flex; gap: 6px; margin-top: 6px; justify-content: flex-end; }

  .edit-btn {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    font-family: inherit; font-size: 12px; padding: 5px 12px;
    border-radius: 8px; cursor: pointer; transition: all 0.1s;
  }

  .edit-btn:hover { border-color: var(--text-dim); color: var(--text); }

  .edit-btn.save {
    background: var(--accent-dim); border-color: var(--accent-dim); color: white;
  }

  .edit-btn.save:hover { background: var(--accent); }

  .typing { display: flex; gap: 5px; padding: 12px 0; align-self: flex-start; }

  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-dim); animation: blink 1.4s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink { 0%, 60%, 100% { opacity: 0.2; } 30% { opacity: 1; } }

  /* ── Input ── */
  .input-area { flex-shrink: 0; padding: 12px 24px 24px; border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }

  textarea#input {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 14px;
    background: var(--surface); color: var(--text); font-family: inherit;
    font-size: 14.5px; line-height: 1.5; padding: 12px 16px; outline: none;
    transition: border-color 0.15s; max-height: 160px; overflow-y: auto;
  }

  textarea#input::placeholder { color: var(--text-faint); }
  textarea#input:focus { border-color: var(--border-glow); }

  button.send {
    flex-shrink: 0; width: 42px; height: 42px; border: none; border-radius: 12px;
    background: var(--accent-dim); color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
  }

  button.send:hover { background: var(--accent); }
  button.send:active { transform: scale(0.95); }
  button.send:disabled { opacity: 0.3; cursor: not-allowed; }
  button.send svg { width: 18px; height: 18px; }

  .meta-bar {
    display: flex; justify-content: flex-end; padding: 6px 2px 0;
    font-size: 11px; color: var(--text-faint);
  }

  .key-banner {
    padding: 12px 24px; background: var(--surface-2); border-bottom: 1px solid var(--border);
    font-size: 13px; color: var(--text-dim);
  }
  .key-banner p { margin-bottom: 8px; }
  .key-input-row { display: flex; gap: 8px; align-items: center; }
  .key-banner input {
    flex: 1; max-width: 320px; padding: 8px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .key-banner input:focus { outline: none; border-color: var(--accent); }
  .key-submit {
    padding: 8px 16px; border-radius: 8px; border: none;
    background: var(--accent-dim); color: white; font-size: 13px; cursor: pointer;
  }
  .key-submit:hover { background: var(--accent); }

  /* ── Mobile ── */
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9; }

  @media (max-width: 700px) {
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 10; transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .menu-btn { display: block; }
    .messages { padding: 16px; }
    .input-area { padding: 10px 16px 20px; }
    .msg-wrap { max-width: 92%; }
  }
</style>
</head>
<body>

<div class="sidebar-overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="brand-mark">P</div>
    <h1>PNEUOMA CORE</h1>
  </div>
  <button class="new-chat-btn" id="newChatBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New chat
  </button>
  <div class="chat-list" id="chatList"></div>
  <div class="sidebar-footer">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">connecting...</span>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="menu-btn" id="menuBtn">&#9776;</button>
      <span class="topbar-title" id="topbarTitle">New chat</span>
    </div>
    <div class="topbar-right">
      <span class="memories-tag" id="profileTag"></span>
      <span id="latencyDisplay" style="font-size:11px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;"></span>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="big-mark">P</div>
      <p>PNEUOMA Core</p>
      <p class="sub" id="emptyStatus">loading...</p>
    </div>
  </div>

  <div class="key-banner" id="keyBanner" style="display:none;">
    <p>API key required. Enter your key to send messages. (Get it from your deployment config, e.g. PNEUOMA_AI_KEY.)</p>
    <div class="key-input-row">
      <input type="password" id="keyInput" placeholder="API key" autocomplete="off" />
      <button type="button" class="key-submit" id="keySubmit">Save</button>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Talk to your consciousness..." autofocus></textarea>
      <button class="send" id="sendBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="meta-bar"><span id="metaInfo"></span></div>
  </div>
</main>

<script>
const API_BASE = window.location.origin;
const API_KEY = localStorage.getItem('pneuoma_api_key') || '';
const STORAGE_KEY = 'pneuoma_chats'; // fallback migration

const $ = id => document.getElementById(id);
const messagesEl = $('messages');
const inputEl = $('input');
const sendBtn = $('sendBtn');

let chats = [];
let activeChatId = null;
let sending = false;

function headers() {
  const h = { 'Content-Type': 'application/json' };
  if (API_KEY) h['X-API-Key'] = API_KEY;
  return h;
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function getChat() { return chats.find(c => c.id === activeChatId); }
function truncTitle(t) { const c = t.replace(/\n/g, ' ').trim(); return c.length > 40 ? c.slice(0, 40) + '...' : c; }

async function persistChat(chat) {
  try {
    await fetch(`${API_BASE}/v1/chats`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ id: chat.id, title: chat.title, messages: chat.messages, created: chat.created }),
    });
  } catch (e) { console.warn('Failed to persist chat:', e); }
}

// ── Chat Management ──

async function newChat() {
  const chat = { id: genId(), title: 'New chat', messages: [], created: Date.now() };
  chats.unshift(chat);
  await persistChat(chat);
  loadChat(chat.id);
  closeSidebar();
}

function loadChat(id) {
  activeChatId = id;
  const chat = getChat();
  if (!chat) return;

  $('topbarTitle').textContent = chat.title;
  messagesEl.innerHTML = '';

  if (chat.messages.length === 0) {
    messagesEl.appendChild($('emptyState') || createEmptyState());
    $('emptyState').style.display = 'flex';
  } else {
    const es = $('emptyState');
    if (es) es.style.display = 'none';
    chat.messages.forEach((m, i) => appendMsgWrap(m.role, m.content, i));
  }

  renderChatList();
  inputEl.focus();
}

function createEmptyState() {
  const d = document.createElement('div');
  d.className = 'empty-state'; d.id = 'emptyState';
  d.innerHTML = '<div class="big-mark">P</div><p>PNEUOMA Core</p><p class="sub" id="emptyStatus">ready</p>';
  return d;
}

async function deleteChat(id) {
  try {
    await fetch(`${API_BASE}/v1/chats/${id}`, { method: 'DELETE', headers: headers() });
  } catch (e) { console.warn('Failed to delete chat:', e); }
  chats = chats.filter(c => c.id !== id);
  if (activeChatId === id) { chats.length > 0 ? loadChat(chats[0].id) : await newChat(); }
  else renderChatList();
}

function renderChatList() {
  const el = $('chatList');
  el.innerHTML = '';
  chats.forEach(chat => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (chat.id === activeChatId ? ' active' : '');
    const title = document.createElement('span');
    title.className = 'chat-item-title';
    title.textContent = chat.title;
    title.onclick = () => { loadChat(chat.id); closeSidebar(); };
    const del = document.createElement('button');
    del.className = 'chat-item-delete';
    del.textContent = '\u00d7';
    del.onclick = (e) => { e.stopPropagation(); deleteChat(chat.id); };
    item.appendChild(title);
    item.appendChild(del);
    el.appendChild(item);
  });
}

// ── Messages ──

function appendMsgWrap(role, content, msgIndex) {
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;
  wrap.dataset.idx = msgIndex;

  const msg = document.createElement('div');
  msg.className = 'msg';
  msg.textContent = content;
  wrap.appendChild(msg);

  if (role === 'user') {
    const actions = document.createElement('div');
    actions.className = 'msg-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'msg-action-btn';
    editBtn.textContent = 'edit';
    editBtn.onclick = () => startEdit(wrap, msgIndex);
    actions.appendChild(editBtn);

    wrap.appendChild(actions);
  }

  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

function startEdit(wrap, msgIndex) {
  const chat = getChat();
  if (!chat || sending) return;

  const currentText = chat.messages[msgIndex].content;
  wrap.innerHTML = '';

  const textarea = document.createElement('textarea');
  textarea.className = 'edit-area';
  textarea.value = currentText;
  textarea.rows = 2;
  wrap.appendChild(textarea);

  const btns = document.createElement('div');
  btns.className = 'edit-actions';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'edit-btn';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = () => loadChat(activeChatId);

  const saveBtn = document.createElement('button');
  saveBtn.className = 'edit-btn save';
  saveBtn.textContent = 'Save & resend';
  saveBtn.onclick = () => editAndResend(msgIndex, textarea.value.trim());

  btns.appendChild(cancelBtn);
  btns.appendChild(saveBtn);
  wrap.appendChild(btns);

  textarea.focus();
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); editAndResend(msgIndex, textarea.value.trim()); }
    if (e.key === 'Escape') loadChat(activeChatId);
  });
}

async function editAndResend(msgIndex, newText) {
  if (!newText || sending) return;
  const chat = getChat();
  if (!chat) return;

  chat.messages = chat.messages.slice(0, msgIndex);
  chat.messages.push({ role: 'user', content: newText });
  await persistChat(chat);

  messagesEl.innerHTML = '';
  const es = $('emptyState');
  if (es) es.style.display = 'none';
  chat.messages.forEach((m, i) => appendMsgWrap(m.role, m.content, i));

  await sendToApi(chat);
}

// ── Send ──

async function send() {
  const text = inputEl.value.trim();
  if (!text || sending) return;

  const chat = getChat();
  if (!chat) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';

  const es = $('emptyState');
  if (es && es.parentNode === messagesEl) { es.style.display = 'none'; messagesEl.removeChild(es); }

  const idx = chat.messages.length;
  chat.messages.push({ role: 'user', content: text });
  appendMsgWrap('user', text, idx);

  if (chat.messages.filter(m => m.role === 'user').length === 1) {
    chat.title = truncTitle(text);
    $('topbarTitle').textContent = chat.title;
    renderChatList();
  }
  await persistChat(chat);

  await sendToApi(chat);
}

async function sendToApi(chat) {
  sending = true;
  sendBtn.disabled = true;

  const typing = document.createElement('div');
  typing.className = 'typing'; typing.id = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(typing);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  const start = performance.now();

  try {
    const res = await fetch(`${API_BASE}/v1/chat/completions`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({
        messages: chat.messages,
        temperature: 0.7,
        max_tokens: 2048,
        consciousness: true,
      }),
    });

    typing.remove();
    const elapsed = Math.round(performance.now() - start);
    $('metaInfo').textContent = `${(elapsed / 1000).toFixed(1)}s`;

    if (!res.ok) {
      if (res.status === 401) {
        localStorage.removeItem('pneuoma_api_key');
        $('keyBanner').style.display = 'block';
        $('keyInput').value = '';
        $('keySubmit').onclick = () => {
          const k = $('keyInput').value.trim();
          if (k) { localStorage.setItem('pneuoma_api_key', k); window.location.reload(); }
        };
      }
      const errWrap = document.createElement('div');
      errWrap.className = 'msg system-msg';
      errWrap.textContent = res.status === 401
        ? 'API key invalid or missing. Enter your key above.'
        : `error: ${res.status} ${res.statusText}`;
      messagesEl.appendChild(errWrap);
      sending = false; sendBtn.disabled = false;
      return;
    }

    const data = await res.json();
    const reply = data.choices[0].message.content;
    const idx = chat.messages.length;
    chat.messages.push({ role: 'assistant', content: reply });
    appendMsgWrap('assistant', reply, idx);
    await persistChat(chat);
  } catch (err) {
    typing.remove();
    const errWrap = document.createElement('div');
    errWrap.className = 'msg system-msg';
    errWrap.textContent = `connection error: ${err.message}`;
    messagesEl.appendChild(errWrap);
  }

  sending = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// ── Health ──

async function checkHealth() {
  try {
    const res = await fetch(`${API_BASE}/health`, { headers: headers() });
    const data = await res.json();
    $('statusDot').classList.remove('offline');
    $('statusText').textContent = `${data.memories_count.toLocaleString()} memories`;
    $('profileTag').textContent = data.profile_loaded ? 'personality active' : 'default profile';
    const es = $('emptyStatus');
    if (es) es.textContent = `${data.memories_count.toLocaleString()} memories indexed`;
    sendBtn.disabled = false;
  } catch {
    $('statusDot').classList.add('offline');
    $('statusText').textContent = 'offline';
    sendBtn.disabled = true;
  }
}

// ── Sidebar ──
function openSidebar() { $('sidebar').classList.add('open'); $('overlay').classList.add('open'); }
function closeSidebar() { $('sidebar').classList.remove('open'); $('overlay').classList.remove('open'); }
$('menuBtn').addEventListener('click', openSidebar);
$('overlay').addEventListener('click', closeSidebar);

// ── Input ──
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);
$('newChatBtn').addEventListener('click', newChat);

if (!API_KEY) {
  const p = new URLSearchParams(window.location.search);
  if (p.has('key')) {
    localStorage.setItem('pneuoma_api_key', p.get('key'));
    window.location.search = '';
  } else {
    $('keyBanner').style.display = 'block';
    $('keySubmit').onclick = () => {
      const k = $('keyInput').value.trim();
      if (k) { localStorage.setItem('pneuoma_api_key', k); window.location.reload(); }
    };
    $('keyInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') $('keySubmit').click();
    });
  }
}

async function initChats() {
  try {
    const res = await fetch(`${API_BASE}/v1/chats`, { headers: headers() });
    if (res.status === 401) {
      localStorage.removeItem('pneuoma_api_key');
      $('keyBanner').style.display = 'block';
      $('keySubmit').onclick = () => {
        const k = $('keyInput').value.trim();
        if (k) { localStorage.setItem('pneuoma_api_key', k); window.location.reload(); }
      };
      $('keyInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('keySubmit').click(); });
      const es = $('emptyStatus');
      if (es) es.textContent = 'Enter your API key above to get started';
      return;
    }
    if (res.ok) {
      chats = await res.json();
      const legacy = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      if (chats.length === 0 && legacy.length > 0) {
        for (const c of legacy) {
          await persistChat(c);
          chats.push(c);
        }
        localStorage.removeItem(STORAGE_KEY);
      }
    }
  } catch (e) { console.warn('Failed to load chats:', e); }
  if (chats.length > 0) loadChat(chats[0].id);
  else await newChat();
}

checkHealth();
setInterval(checkHealth, 30000);
initChats();
</script>
</body>
</html>
